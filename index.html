<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intranet | Acceso</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="login-view">
      <div class="login-card">
        <div class="hero-image logo-hero" role="img" aria-label="Proyectos By Valerita">
          <p class="logo-icon">✌️</p>
          <p class="logo-title">Proyectos By Valerita</p>
          <p class="logo-subtitle">Gestión de proyectos, calendario y chat de equipo</p>
        </div>

        <div class="login-content">
          <p class="eyebrow">Intranet</p>
          <h1>Ingresar</h1>
          <p class="subtitle">Usa tu usuario y clave para entrar.</p>

          <form id="login-form" class="login-form">
            <label>
              Usuario
              <input id="username" name="user" type="text" list="users-list" required />
              <datalist id="users-list">
                <option value="admin"></option>
                <option value="valeria"></option>
                <option value="veronica"></option>
              </datalist>
            </label>

            <label>
              Clave
              <input id="password" name="pass" type="password" required />
            </label>

            <button class="btn" type="submit">Entrar</button>
            <p id="login-error" class="error-message" role="alert"></p>
            <p class="hint">Demo admin: <strong>admin / admin123</strong></p>
          </form>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
