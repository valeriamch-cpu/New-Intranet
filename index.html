<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intranet | Acceso</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="login-view" class="login-view">
      <div class="login-card">
        <div class="hero-image logo-hero" role="img" aria-label="Bienvenido Intranet">
          <p class="logo-title">BIENVENIDO</p>
          <p class="logo-title">INTRANET</p>
          <p class="logo-subtitle">STREETMARKET</p>
        </div>

        <div class="login-content">
          <p class="eyebrow">Intranet</p>
          <h1>Bienvenido al portal interno</h1>
          <p class="subtitle">Ingresa con tu usuario y clave para acceder al calendario, notas y chat grupal.</p>

          <form id="login-form" class="login-form" action="dashboard.html" method="get">
            <label>
              Usuario
              <input id="username" name="user" type="text" placeholder="Ej: admin" required />
            </label>
            <label>
              Clave
              <input id="password" name="pass" type="password" placeholder="••••••••" required />
            </label>
            <button class="btn" type="submit">Entrar</button>
            <a id="preview-btn" class="btn ghost block" href="dashboard.html">Ver intranet ahora</a>
          </form>

          <p class="hint">Acceso demo: puedes usar cualquier usuario y clave para entrar.</p>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
