<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intranet | Acceso</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="login-view" class="login-view">
      <div class="login-card">
        <div class="hero-image logo-hero" role="img" aria-label="Bienvenido Intranet">
          <p class="logo-title">BIENVENIDO</p>
          <p class="logo-title">INTRANET</p>
          <p class="logo-subtitle">STREETMARKET</p>
        </div>

        <div class="login-content">
          <p class="eyebrow">Intranet</p>
          <h1>Bienvenido al portal interno</h1>
          <p class="subtitle">Ingresa con tu usuario y clave para acceder al calendario, notas y chat grupal.</p>

          <form id="login-form" class="login-form">
            <label>
              Usuario
              <input id="username" name="user" type="text" placeholder="Ej: admin" list="users-list" required />
              <datalist id="users-list">
                <option value="valeria"></option>
                <option value="veronica"></option>
                <option value="admin"></option>
              </datalist>
            </label>
            <label>
              Clave
              <input id="password" name="pass" type="password" placeholder="Ingresa tu clave" required />
            </label>
            <button class="btn" type="submit">Entrar</button>
            <p id="login-error" class="error-message" role="alert"></p>
          </form>

          <p class="hint">Prueba rápida: <strong>admin / 2026</strong>. También: valeria/1234, veronica/4567.</p>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
