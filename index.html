<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5b2ca5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>New Intranet | Acceso</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-view">
      <section class="login-card login-card-compact">
        <div class="logo-hero">
          <p class="logo-icon">🏢</p>
          <h1 class="logo-title">New Intranet</h1>
          <p class="logo-subtitle">Acceso con permisos por usuario</p>
        </div>

        <div class="login-content">
          <p class="eyebrow">Ingreso seguro</p>
          <h2>Inicia sesión</h2>
          <p class="subtitle">Cada usuario verá solo los módulos y carpetas permitidas.</p>

          <form id="login-form" class="login-form">
            <label>
              Usuario
              <input id="username" type="text" placeholder="Ej: valeria" required />
            </label>
            <label>
              Clave
              <input id="password" type="password" placeholder="••••" required />
            </label>
            <button type="submit" class="btn">Entrar</button>
            <p id="login-error" class="error-message" role="alert" aria-live="polite"></p>
          </form>

          <p class="hint">Demo: valeria/1234 · veronica/4567 · admin/admin123</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
